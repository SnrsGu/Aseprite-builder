name: Build and deploy Aseprite

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:
  # pull_request:
  #   branches: [ "main" ]

env:
  BUILD_TYPE: Release
  SKIA_VERSION: m124-08a5439a6b
  
jobs:
  check-version:
    name: Check latest Aseprite release
    runs-on: ubuntu-latest
    outputs:
      download_url: ${{ steps.version_info.outputs.download_url }}
      latest_tag: ${{ steps.version_info.outputs.latest_tag }}
      should_build: ${{ steps.should_build.outputs.should_build }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
    - name: Get latest version info
      id: version_info
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        data=$(curl --fail-with-body --silent --show-error --location \
          --header "Accept: application/vnd.github+json" \
          --header "Authorization: Bearer ${GH_TOKEN}" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/aseprite/aseprite/releases/224436097)

        LATEST_TAG=$(echo "${data}" | jq -er '.tag_name | select(type == "string" and length > 0)')
        DOWNLOAD_URL=$(echo "${data}" | jq -er '
          .assets[] |
          select(.name | test("^Aseprite-v.*-Source\\.zip$")) |
          .browser_download_url' | head -n 1)
        VERSION_INFO=$(echo "${data}" | jq -r '.body // ""')

        if [[ -z "${DOWNLOAD_URL}" ]]; then
          echo "No Aseprite source archive was found in release ${LATEST_TAG}." >&2
          exit 1
        fi

        echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT
        delimiter="ASEPRITE_RELEASE_NOTES_$(date +%s)_${RANDOM}"
        echo "version_info<<${delimiter}" >> $GITHUB_OUTPUT
        echo "$VERSION_INFO" >> $GITHUB_OUTPUT
        echo "${delimiter}" >> $GITHUB_OUTPUT
        echo "${LATEST_TAG}" > "${LATEST_TAG}.txt"
    - name: Load version from cache
      id: version_check
      uses: actions/cache@v4
      with:
        path: ${{ steps.version_info.outputs.latest_tag }}.txt
        key: cached-version-${{ steps.version_info.outputs.latest_tag }}
    - name: Should we start new build?
      id: should_build
      if: (github.event_name == 'workflow_dispatch' || steps.version_check.outputs.cache-hit != 'true') && contains(steps.version_info.outputs.latest_tag, 'beta') == false && contains(steps.version_info.outputs.latest_tag, 'rc') == false
      run: echo "should_build=true" >> $GITHUB_OUTPUT
    - name: Create Release
      id: create_release
      if: steps.should_build.outputs.should_build && github.event_name != 'workflow_dispatch'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version_info.outputs.latest_tag }}
        release_name: Release Aseprite ${{ steps.version_info.outputs.latest_tag }}
        body: |
          ${{ steps.version_info.outputs.version_info }}
        draft: false
        prerelease: false
  
  build-aseprite:
    name: Build Aseprite
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
#        os: [windows-latest, ubuntu-latest, macOS-latest]
        os: [windows-latest]
        arch: [x64]
#        include:
#          - os: macOS-latest
#            arch: arm64
      fail-fast: false
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: (Windows) Install dependencies
        if: matrix.os == 'windows-latest' && matrix.arch == 'x64'
        uses: seanmiddleditch/gha-setup-ninja@v3
      - name: (Ubuntu) Install dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang cmake ninja-build libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev libfontconfig1-dev fuse
      - name: (macOS) Install dependencies
        if: matrix.os == 'macOS-latest'
        run: brew install ninja p7zip
      - name: Get Skia from cache
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-${{ env.SKIA_VERSION }}-${{ matrix.os }}-${{ matrix.arch }}
      - name: Download Skia if not in cache (linux)
        if: steps.skia-cache.outputs.cache-hit != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          curl --fail --location --retry 3 --output Skia-${{ runner.os }}-Release-x64.zip https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-${{ runner.os }}-Release-x64.zip
          unzip Skia-${{ runner.os }}-Release-x64.zip -d skia
      - name: Download Skia if not in cache (macOS x64)
        if: steps.skia-cache.outputs.cache-hit != 'true' && matrix.os == 'macOS-latest' && matrix.arch == 'x64'
        run: |
          curl --fail --location --retry 3 --output Skia-${{ runner.os }}-Release-x64.zip https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-${{ runner.os }}-Release-x64.zip
          unzip Skia-${{ runner.os }}-Release-x64.zip -d skia
      - name: Download Skia if not in cache (macOS arm64)
        if: steps.skia-cache.outputs.cache-hit != 'true' && matrix.os == 'macOS-latest' && matrix.arch == 'arm64'
        run: |
          curl --fail --location --retry 3 --output Skia-${{ runner.os }}-Release-arm64.zip https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-${{ runner.os }}-Release-arm64.zip
          unzip Skia-${{ runner.os }}-Release-arm64.zip -d skia
      - name: Download Skia if not in cache (Windows)
        if: steps.skia-cache.outputs.cache-hit != 'true' && matrix.os == 'windows-latest'
        run: |
          curl.exe --fail --location --retry 3 --output Skia-${{ runner.os }}-Release-x64.zip https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-${{ runner.os }}-Release-x64.zip
          Expand-Archive -Path Skia-${{ runner.os }}-Release-x64.zip -DestinationPath skia
      - name: Validate Skia package
        shell: bash
        run: |
          test -d "skia/out/Release-${{ matrix.arch }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f "skia/out/Release-${{ matrix.arch }}/skia.lib"
          else
            test -f "skia/out/Release-${{ matrix.arch }}/libskia.a"
          fi
      - name: Download Aseprite release
        run: |
          curl --fail --location --retry 3 --output Aseprite-source.zip ${{ needs.check-version.outputs.download_url }}
          unzip Aseprite-source.zip -d aseprite
          mkdir -p aseprite/build
      - name: (Windows) Setting Visual Studio build environment variables and paths
        if: matrix.os == 'windows-latest'
        uses: seanmiddleditch/gha-setup-vsdevenv@v4
      - name: (Windows) Run CMake
        if: matrix.os == 'windows-latest'
        working-directory: aseprite/build
        shell: cmd
        run: cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DLAF_BACKEND=skia -DSKIA_DIR=%GITHUB_WORKSPACE%\skia -DSKIA_LIBRARY_DIR=%GITHUB_WORKSPACE%\skia\out\Release-x64 -DSKIA_LIBRARY=%GITHUB_WORKSPACE%\skia\out\Release-x64\skia.lib -DBUILD_SHARED_LIBS=OFF -DUSE_SHARED_CURL=OFF -DCURL_STATICLIB=ON -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL:BOOL=TRUE -DCMAKE_USE_OPENSSL=OFF -DCMAKE_USE_LIBSSH2=OFF -DCMAKE_USE_SCHANNEL=ON -DCURL_USE_OPENSSL=OFF -DCURL_USE_LIBSSH2=OFF -DCURL_USE_SCHANNEL=ON -G Ninja ..
      - name: (Windows) Validate CMake TLS configuration
        if: matrix.os == 'windows-latest'
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $cache = Get-Content -LiteralPath CMakeCache.txt
          $expected = [ordered]@{
            BUILD_SHARED_LIBS = 'OFF'
            USE_SHARED_CURL = 'OFF'
            CMAKE_DISABLE_FIND_PACKAGE_OpenSSL = 'TRUE'
            CMAKE_USE_OPENSSL = 'OFF'
            CMAKE_USE_LIBSSH2 = 'OFF'
            CMAKE_USE_SCHANNEL = 'ON'
          }
          foreach ($entry in $expected.GetEnumerator()) {
            $pattern = '^' + [regex]::Escape($entry.Key) + ':[^=]+=' + [regex]::Escape($entry.Value) + '$'
            if (-not ($cache | Select-String -Pattern $pattern -Quiet)) {
              throw "Unexpected CMake configuration: $($entry.Key) must be $($entry.Value)"
            }
          }
      - name: (Ubuntu) Run CMake
        if: matrix.os == 'ubuntu-latest'
        working-directory: aseprite/build
        run: |
          CC=clang CXX=clang++ cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_FLAGS:STRING=-stdlib=libstdc++ \
            -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libstdc++ \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR="$GITHUB_WORKSPACE/skia" \
            -DSKIA_LIBRARY_DIR="$GITHUB_WORKSPACE/skia/out/Release-x64" \
            -DSKIA_LIBRARY="$GITHUB_WORKSPACE/skia/out/Release-x64/libskia.a" \
            -G Ninja ..
      - name: (macOS x64) Run CMake
        if: matrix.os == 'macOS-latest' && matrix.arch == 'x64'
        working-directory: aseprite/build
        run: cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=10.9 -DCMAKE_OSX_SYSROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk -DLAF_BACKEND=skia -DSKIA_DIR="$GITHUB_WORKSPACE/skia" -DSKIA_LIBRARY_DIR="$GITHUB_WORKSPACE/skia/out/Release-x64" -DSKIA_LIBRARY="$GITHUB_WORKSPACE/skia/out/Release-x64/libskia.a" -G Ninja ..
      - name: (macOS arm64) Run CMake
        if: matrix.os == 'macOS-latest' && matrix.arch == 'arm64'
        working-directory: aseprite/build
        run: cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_OSX_SYSROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk -DLAF_BACKEND=skia -DSKIA_DIR="$GITHUB_WORKSPACE/skia" -DSKIA_LIBRARY_DIR="$GITHUB_WORKSPACE/skia/out/Release-arm64" -DSKIA_LIBRARY="$GITHUB_WORKSPACE/skia/out/Release-arm64/libskia.a" -DPNG_ARM_NEON:STRING=on -G Ninja ..
        
      - name: Run Ninja
        working-directory: aseprite/build
        run: ninja aseprite
      - name: Clean up build
        working-directory: aseprite/build/bin
        shell: bash
        run: rm -f gen modp_b64_gen gen.exe gen.exe.manifest modp_b64_gen.exe modp_b64_gen.exe.manifest
      - name: Add .ini file
        working-directory: aseprite/build/bin
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini
      - name: Add Multilingual
        working-directory: aseprite/build/bin/data
        shell: bash
        run: |
          rm -f strings/*.ini
          curl -o strings-main.zip -L https://codeload.github.com/aseprite/strings/zip/refs/heads/main
          unzip strings-main.zip -d strings-main
          cp strings-main/strings-main/*.ini strings
          rm -rf strings-main
      - name: (Windows) Rename Executable File
        if: matrix.os == 'windows-latest'
        working-directory: aseprite/build/bin
        run: ren aseprite.exe Aseprite.exe
      - name: (Windows) Verify portable executable dependencies
        if: matrix.os == 'windows-latest'
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          # The embedded static curl must use Windows Schannel. Do not hide an
          # accidental dynamic OpenSSL link by shipping runner-specific DLLs.
          $badDependencies = @()
          $opensslName = '(?i)^lib(?:crypto|ssl)-.*\.dll$'
          $nativeBinaries = Get-ChildItem -File | Where-Object {
            $_.Extension -in '.exe', '.dll' -and $_.Name -notmatch $opensslName
          }
          foreach ($binary in $nativeBinaries) {
            $imports = dumpbin /dependents $binary.FullName | Out-String
            $opensslImports = [regex]::Matches(
              $imports,
              '(?im)^\s*(lib(?:crypto|ssl)-[^\s]+\.dll)\s*$'
            ) | ForEach-Object { $_.Groups[1].Value }
            foreach ($import in $opensslImports) {
              $badDependencies += "$($binary.Name) -> $import"
            }
          }
          if ($badDependencies.Count -gt 0) {
            $badDependencies | ForEach-Object { Write-Error $_ }
            throw 'Windows build unexpectedly depends on OpenSSL DLLs; Schannel/static curl configuration was not applied.'
          }
          Get-ChildItem -File | Where-Object { $_.Name -match $opensslName } | Remove-Item -Force
      - name: (macOS) Make App
        if: matrix.os == 'macOS-latest'
        working-directory: aseprite/build/bin
        run: |
          mkdir -p Aseprite.app/Contents/MacOS
          mkdir -p Aseprite.app/Contents/Resources
          
          if [[ ! -f Aseprite.app/Contents/MacOS/aseprite ]]; then
            cp aseprite Aseprite.app/Contents/MacOS
          fi
          cp aseprite.ini Aseprite.app/Contents/Resources
          cp -r data Aseprite.app/Contents/Resources
          cp $GITHUB_WORKSPACE/macOS/Aseprite.icns Aseprite.app/Contents/Resources
          cp $GITHUB_WORKSPACE/macOS/Document.icns Aseprite.app/Contents/Resources
          cp $GITHUB_WORKSPACE/macOS/Extension.icns Aseprite.app/Contents/Resources
          cp $GITHUB_WORKSPACE/macOS/Info.plist Aseprite.app/Contents
          
          CLEAN_VERSION=$(echo "${{ needs.check-version.outputs.latest_tag }}" | sed 's/^v//')
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $CLEAN_VERSION" Aseprite.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $CLEAN_VERSION" Aseprite.app/Contents/Info.plist

          rm -f aseprite
          rm -f aseprite.ini
          rm -rf data
        
      - name: (Ubuntu) Build .deb package
        if: matrix.os == 'ubuntu-latest'
        working-directory: aseprite/build/bin
        run: |
          mkdir -p Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/usr/bin
          mkdir -p Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/usr/share/aseprite

          cp aseprite Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/usr/bin
          cp aseprite.ini Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/usr/share/aseprite
          cp -r data Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/usr/share/aseprite

          mkdir -p Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN
          echo "Package: aseprite" > Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          CLEAN_VERSION=$(echo "${{ needs.check-version.outputs.latest_tag }}" | sed 's/^v//')
          echo "Version: $CLEAN_VERSION" >> Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          echo "Architecture: amd64" >> Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          echo "Maintainer: Aseprite Team <support@aseprite.org>" >> Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          echo "Description: Animated sprite editor and pixel art tool" >> Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          echo "Depends: libc6, libx11-6, libfontconfig1, libgl1, libxrender1" >> Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64/DEBIAN/control
          dpkg-deb --build \
            Aseprite_${{ needs.check-version.outputs.latest_tag }}_amd64 \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64.deb

      - name: (Ubuntu) Build .AppImage
        if: matrix.os == 'ubuntu-latest'
        working-directory: aseprite/build/bin
        run: |
          curl -o appimagetool-x86_64.AppImage -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          
          mkdir -p Aseprite.AppDir/usr/bin
          mkdir -p Aseprite.AppDir/usr/share/aseprite
          mkdir -p Aseprite.AppDir/usr/share/icons
          mkdir -p Aseprite.AppDir/usr/share/applications

          cp aseprite Aseprite.AppDir/usr/bin
          cp aseprite.ini Aseprite.AppDir/usr/share/aseprite
          cp -r data Aseprite.AppDir/usr/share/aseprite
          cp data/icons/ase.ico Aseprite.AppDir/usr/share/icons
          cp $GITHUB_WORKSPACE/Ubuntu/aseprite.desktop Aseprite.AppDir/usr/share/applications
          cp $GITHUB_WORKSPACE/Ubuntu/aseprite.desktop Aseprite.AppDir
          cp $GITHUB_WORKSPACE/Ubuntu/aseprite.png Aseprite.AppDir

          appimagetool \
            Aseprite.AppDir \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64.AppImage

      - name: (Ubuntu) Package each distribution separately
        if: matrix.os == 'ubuntu-latest'
        working-directory: aseprite/build/bin
        run: |
          7z a -tzip \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64-deb.zip \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64.deb
          7z a -tzip \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64-AppImage.zip \
            Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64.AppImage

      - name: Clean up redundant files
        if: matrix.os == 'macOS-latest' || matrix.os == 'ubuntu-latest'
        working-directory: aseprite/build/bin
        run: |
          rm -f aseprite
          rm -f aseprite.ini
          rm -rf data
        
      - name: Create release
        if: matrix.os != 'ubuntu-latest'
        working-directory: aseprite/build
        run: |
          mv bin Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}
          7z a -tzip Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}.zip Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}
      - name: Upload release
        if: github.event_name != 'workflow_dispatch' && (matrix.os == 'windows-latest' || matrix.os == 'macOS-latest')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.check-version.outputs.upload_url }}
          asset_path: aseprite/build/Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}.zip
          asset_name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}.zip
          asset_content_type: application/zip
      - name: (Ubuntu) Upload Debian package ZIP
        if: github.event_name != 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.check-version.outputs.upload_url }}
          asset_path: aseprite/build/bin/Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64-deb.zip
          asset_name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64-deb.zip
          asset_content_type: application/zip
      - name: (Ubuntu) Upload AppImage ZIP
        if: github.event_name != 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.check-version.outputs.upload_url }}
          asset_path: aseprite/build/bin/Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64-AppImage.zip
          asset_name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64-AppImage.zip
          asset_content_type: application/zip
      - name: Upload manual build artifact
        if: github.event_name == 'workflow_dispatch' && matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}
          path: aseprite/build/Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}-${{ matrix.arch }}.zip
          if-no-files-found: error
      - name: (Ubuntu) Upload manual Debian artifact
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64-deb
          path: aseprite/build/bin/Aseprite-${{ needs.check-version.outputs.latest_tag }}-Ubuntu-amd64-deb.zip
          if-no-files-found: error
      - name: (Ubuntu) Upload manual AppImage artifact
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64-AppImage
          path: aseprite/build/bin/Aseprite-${{ needs.check-version.outputs.latest_tag }}-Linux-x86_64-AppImage.zip
          if-no-files-found: error
